services:
  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - env/.env.example

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - env/.env.example
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: naveencodes_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  redis:
    image: redis:7-alpine
